<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Smart Golden Link | نظام الصيانة الذكي</title>
    <style>
        :root { --main: #0b1a2e; --gold: #d4af37; --light: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--main); line-height: 1.6; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .header { background: var(--main); color: var(--gold); text-align: center; padding: 40px; border-bottom: 5px solid var(--gold); border-radius: 20px; }
        .section { background: white; padding: 25px; border-radius: 15px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { border-right: 4px solid var(--gold); padding-right: 15px; color: var(--main); }
        select, textarea, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn-submit { background: var(--gold); color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Smart Golden Link</h1>
        <p>رواد صيانة الأجهزة والخدمات التقنية في الأردن</p>
        <p style="font-size: 14px; color: white;">عقود صيانة سنوية وشهرية بأسعار تشجيعية</p>
    </div>

    <div class="section">
        <h2>نموذج الخدمة المتكامل</h2>
        <form id="smartForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="tel" id="phone" placeholder="رقم الهاتف" required>
            
            <label>المحافظة:</label>
            <select id="gov" onchange="updateRegions()">
                <option value="عمان">عمان</option>
                <option value="معان">معان</option>
                <option value="الكرك">الكرك</option>
                <option value="الطفيلة">الطفيلة</option>
                <option value="عجلون">عجلون</option>
                <option value="إربد">إربد</option>
                <option value="جرش">جرش</option>
            </select>
            
            <select id="region"><option>يرجى اختيار المنطقة</option></select>
            
            <label>القطاع والخدمة:</label>
            <select id="sector" onchange="updateServices()">
                <option value="منزلي">القطاع المنزلي</option>
                <option value="فندقي">القطاع الفندقي</option>
                <option value="مصانع">القطاع الصناعي</option>
                <option value="حكومي">القطاع الحكومي</option>
            </select>
            <select id="service"></select>

            <label>نوع التعاقد:</label>
            <select id="contractType">
                <option value="زيارة واحدة">زيارة واحدة (كشفية)</option>
                <option value="عقد شهري">عقد صيانة شهري</option>
                <option value="عقد سنوي">عقد صيانة سنوي (توفير أكثر)</option>
            </select>

            <textarea id="details" placeholder="شرح طبيعة العطل (ماتور، غاز، شاشة، لوحة إلكترونية..)"></textarea>
            
            <button type="button" class="btn-submit" onclick="sendToWhatsApp()">إرسال الطلب عبر واتساب</button>
        </form>
    </div>
</div>

<script>
    const data = {
        "عمان": ["عمان الغربية (الصويفية، الرابية)", "عمان الشمالية", "عمان الشرقية", "وسط البلد"],
        "معان": ["مدينة معان", "وادي موسى"],
        "الكرك": ["الكرك المركز", "المزار"],
        "إربد": ["إربد المركز", "الرمثا"]
    };
    
    const services = {
        "منزلي": ["صيانة غسالات", "شحن غاز ثلاجات", "صيانة مكيفات"],
        "فندقي": ["صيانة غرف التبريد", "أفران صناعية"],
        "مصانع": ["لوحات تحكم كهربائية", "معدات طاقة"],
        "حكومي": ["عقود صيانة شاملة"]
    };

    function updateRegions() {
        const gov = document.getElementById('gov').value;
        const regionSel = document.getElementById('region');
        regionSel.innerHTML = data[gov].map(r => `<option>${r}</option>`).join('');
    }

    function updateServices() {
        const sector = document.getElementById('sector').value;
        const serviceSel = document.getElementById('service');
        serviceSel.innerHTML = services[sector].map(s => `<option>${s}</option>`).join('');
    }

    function sendToWhatsApp() {
        const msg = `طلب صيانة جديد من Smart Golden Link:
        الاسم: ${document.getElementById('name').value}
        الهاتف: ${document.getElementById('phone').value}
        الموقع: ${document.getElementById('gov').value} - ${document.getElementById('region').value}
        القطاع: ${document.getElementById('sector').value}
        الخدمة: ${document.getElementById('service').value}
        نوع التعاقد: ${document.getElementById('contractType').value}
        التفاصيل: ${document.getElementById('details').value}`;
        
        window.open(`https://wa.me/962790252605?text=${encodeURIComponent(msg)}`, '_blank');
    }
    
    updateRegions(); updateServices();
</script>
</body>
</html>
